# Based on example https://github.com/bilayer-containers/bilayers/blob/main/algorithms/cellpose_inference/config.yaml
citations:
  - name: "BilayersTest"
    doi: 10.1016/j.cels.2022.12.006
    license: "BSD 3-Clause"
    description: "Bilayers test"

docker_image:
  org: torecluik
  name: w_bilayerstest
  #tag: "v0.0.1"
  platform: "linux/amd64"

algorithm_folder_name: "W_BilayersTest"

exec_function: 
  name: "generate_cli_command"
  cli_command: "python -m main.py"
  hidden_args:

inputs:
  - name: inputfile
    type: image
    label: "Input image"
    subtype: 
      - grayscale
      - color
      - binary
      - plate
    description: "Path to the directory of input image"
    cli_tag: "--inputfile"
    cli_order: 0
    default: "directory"
    optional: False
    format: 
      - tiff
      - ometiff
      - omezarr
    folder_name: "/input_image"
    file_count: "multiple"
    section_id: "inputs"
    mode: "beginner"

  - name: measurement_table
    type: measurement
    label: "Measurement table"
    description: "Optional measurement/results table to feed into the workflow (e.g. a CSV from a previous analysis step)."
    cli_tag: "--measurement_table"
    cli_order: 1
    optional: True
    format:
      - csv
      - parquet
      - feather
    file_count: "single"
    section_id: "file-inputs"
    mode: "beginner"

  - name: extra_array
    type: array
    label: "Extra array input"
    description: "Optional numpy array to pass in (e.g. a pre-computed feature matrix)."
    cli_tag: "--extra_array"
    cli_order: 2
    optional: True
    format:
      - npy
      - npz
    file_count: "single"
    section_id: "file-inputs"
    mode: "beginner"

  - name: config_file
    type: file
    label: "Config file"
    description: "Optional generic config or parameter file for the algorithm."
    cli_tag: "--config_file"
    cli_order: 3
    optional: True
    format:
      - json
      - yaml
      - yml
      - toml
    file_count: "single"
    section_id: "file-inputs"
    mode: "advanced"

  - name: custom_model
    type: executable
    label: "Custom model / executable"
    description: "Optional pre-trained model weights or executable to use instead of the default."
    cli_tag: "--custom_model"
    cli_order: 4
    optional: True
    file_count: "single"
    section_id: "file-inputs"
    mode: "advanced"

outputs:
  - name: outputfolder
    type: image
    label: "Output image"
    subtype:
      - grayscale
      - color
      - binary
    description: "Segmented image if --save_omezarr flag is true."
    cli_tag: "--outputfolder"
    cli_order: 0
    default: "directory"
    optional: True
    format: 
      - tiff
      - ometiff
      - omezarr
    folder_name: "/output_image"
    file_count: "multiple"
    section_id: "outputs"
    mode: "beginner"

  - name: logfile
    type: file
    label: "Run log"
    description: "Key/value log of the parameters used for this run."
    cli_tag: "--logfile"
    cli_order: 1
    default: "single"
    optional: True
    format:
      - log
    folder_name: "/output_image"
    file_count: "single"
    section_id: "outputs"
    mode: "beginner"

parameters:
  - name: pick_one
    type: radio
    label: "Pick one"
    description: "Demo dropdown — labels differ from values."
    options:
      - label: "Option Alpha"
        value: alpha
      - label: "Option Beta"
        value: beta
      - label: "Option Gamma"
        value: gamma
    default: alpha
    cli_tag: "--pick_one"
    optional: True
    section_id: "demo-args"
    mode: "beginner"

  - name: a_number
    type: float
    label: "A number"
    description: "Demo float."
    default: 1.0
    cli_tag: "--a_number"
    optional: True
    section_id: "demo-args"
    mode: "beginner"

  - name: an_axis
    type: radio
    label: "An axis"
    description: "Demo dropdown where labels equal values."
    options:
      - label: 0
        value: 0
      - label: 1
        value: 1
      - label: 2
        value: 2
    default: 0
    cli_tag: "--an_axis"
    optional: True
    section_id: "demo-args"
    mode: "advanced"

  - name: a_count
    type: integer
    label: "A count"
    description: "Demo integer."
    default: 10
    cli_tag: "--a_count"
    optional: True
    section_id: "demo-args"
    mode: "advanced"

  - name: save_dir
    type: textbox
    label: "Save directory"
    description: "Directory to save output files."
    output_dir_set: True
    default: "/output_images"
    cli_tag: "--savedir"
    optional: True
    section_id: "demo-args"
    mode: "advanced"


